<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="BH Door Solutions Metro Detroit">
  <defs>
    <linearGradient id="bhBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c3d60"/>
      <stop offset="1" stop-color="#0d2035"/>
    </linearGradient>
    <linearGradient id="bhDoor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8be4c"/>
      <stop offset="1" stop-color="#e8a11b"/>
    </linearGradient>
  </defs>
  <rect x="3" y="3" width="58" height="58" rx="15" fill="url(#bhBg)"/>
  <rect x="3.5" y="3.5" width="57" height="57" rx="14.5" fill="none" stroke="#f8be4c" stroke-opacity="0.18"/>
  <!-- door -->
  <path d="M22 49 V27 A10 10 0 0 1 42 27 V49 Z" fill="url(#bhDoor)"/>
  <!-- inner panel outlines -->
  <path d="M26 31 h12 M26 40 h12" stroke="#0d2035" stroke-opacity="0.30" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M26 30.5 V47 M38 30.5 V47" stroke="#0d2035" stroke-opacity="0.14" stroke-width="1.1" fill="none"/>
  <!-- handle -->
  <circle cx="36.4" cy="39" r="1.7" fill="#0d2035"/>
  <!-- threshold -->
  <rect x="18" y="49" width="28" height="3.4" rx="1.7" fill="#f8be4c"/>
  <!-- swing arc -->
  <path d="M22 49 A27 27 0 0 1 49 22" fill="none" stroke="#f8be4c" stroke-opacity="0.28" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="2 3"/>
</svg>
